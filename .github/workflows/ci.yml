name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  patch-anchors:
    name: verify zsh iOS patch anchors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python3 .github/scripts/verify-zsh-ios-patches.py

  eval:
    name: flake eval (instantiation)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: fragment evaluates
        run: nix eval .#registryFragment --apply builtins.attrNames
      - name: zsh instantiates (no build)
        run: |
          nix eval --raw .#packages.aarch64-darwin.zsh-ios.drvPath
          nix eval --raw .#packages.aarch64-darwin.zsh-framework-ios.drvPath
          nix eval --raw .#packages.aarch64-darwin.wawona-rootfs-ios.drvPath

  build:
    name: build zsh
    runs-on: macos-15
    needs: eval
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix build .#packages.aarch64-darwin.zsh-ios -L
